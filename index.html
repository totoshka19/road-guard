<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Один тег без media: браузер выбирал бы между media-вариантами по системной
      настройке и не знал бы про ручной выбор темы. Значение ставит скрипт ниже
      (до первой отрисовки) и дальше поддерживает applyTheme.
    -->
    <meta name="theme-color" content="#0b0f17" />
    <meta
      name="description"
      content="RoadGuard — real-time дашборд мониторинга дорожных нарушений на карте города."
    />
    <title>RoadGuard — мониторинг дорожных нарушений</title>
    <script>
      // Ставим тему до первой отрисовки, иначе при светлой системной теме
      // мигнёт тёмная (значения по умолчанию в :root). Ключ, правило и цвета
      // должны совпадать с src/lib/theme.ts — согласованность закреплена тестом.
      // Дальше атрибут и meta ведёт useThemeSync через applyTheme.
      ;(function () {
        try {
          const stored = localStorage.getItem('roadguard:theme')
          const choice = stored === 'light' || stored === 'dark' ? stored : null
          const dark = choice
            ? choice === 'dark'
            : matchMedia('(prefers-color-scheme: dark)').matches
          document.documentElement.dataset.theme = dark ? 'dark' : 'light'
          const meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', dark ? '#0b0f17' : '#f8fafc')
        } catch {
          // Приватный режим или заблокированный localStorage — остаёмся на :root.
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
