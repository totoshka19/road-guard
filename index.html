<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#0b0f17"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#f8fafc"
    />
    <meta
      name="description"
      content="RoadGuard — real-time дашборд мониторинга дорожных нарушений на карте города."
    />
    <title>RoadGuard — мониторинг дорожных нарушений</title>
    <script>
      // Ставим тему до первой отрисовки, иначе при светлой системной теме
      // мигнёт тёмная (значения по умолчанию в :root). Ключ и правила должны
      // совпадать с src/lib/theme.ts — дальше атрибут ведёт useThemeSync.
      ;(function () {
        try {
          const stored = localStorage.getItem('roadguard:theme')
          const choice = stored === 'light' || stored === 'dark' ? stored : null
          const dark = choice
            ? choice === 'dark'
            : matchMedia('(prefers-color-scheme: dark)').matches
          document.documentElement.dataset.theme = dark ? 'dark' : 'light'
        } catch {
          // Приватный режим или заблокированный localStorage — остаёмся на :root.
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
